<!DOCTYPE html>
<html lang="en" data-theme="wedding">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>NOIЯFRAME</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<link rel="preload" as="image" href="images/hero01.jpg" media="(min-width: 900px)">
<link rel="preload" as="image" href="images/hero-mobile/hero02.jpg" media="(max-width: 899px) and (orientation: portrait)">
<link rel="preload" as="image" href="images/hero-mobile/hero03.jpg" media="(orientation: landscape) and (hover: none) and (pointer: coarse)">
<link rel="stylesheet" href="website/styles.css">
</head>

<body>

<div class="container fade show">

<div class="heroStage">
<picture class="heroPicture">
<source media="(orientation: landscape) and (hover: none) and (pointer: coarse)" srcset="images/hero-mobile/hero03.jpg">
<source media="(max-width: 899px) and (orientation: portrait)" srcset="images/hero-mobile/hero02.jpg">
<img class="heroArt" src="images/hero01.jpg" alt="" fetchpriority="high" decoding="async">
</picture>
<button id="enterButton" type="button">ENTER</button>
</div>

</div>

<script src="script.js" defer></script>

</body>
</html>
